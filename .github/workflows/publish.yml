# GitHub Actions workflow for linting, testing, building, and publishing
# to npm and jsr using pnpm and package.json scripts

name: Publish

on:
  release:
    types: [published]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: 'package.json'
      - uses: actions/setup-node@v5
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run format
        run: pnpm run format:check
      - name: Run lint
        run: pnpm run lint:check --format github --type-check
      - name: Run build
        run: pnpm build

  build-and-publish-npm:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: 'package.json'
      - uses: actions/setup-node@v5
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publish:npm --no-git-checks

  publish-jsr:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for JSR auth
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: 'package.json'
      - uses: actions/setup-node@v5
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Rewrite discord.js imports for JSR
        run: |
          VERSION=$(node -p "require('./package.json').peerDependencies['discord.js']")
          find src -name '*.ts' | xargs sed -i "s|'discord\.js'|'npm:discord.js@${VERSION}'|g"
      - run: pnpm publish:jsr --allow-dirty
