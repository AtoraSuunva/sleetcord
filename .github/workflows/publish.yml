# GitHub Actions workflow for linting, testing, building, and publishing
# to npm and jsr using pnpm and package.json scripts

name: Publish

on:
  release:
    types: [published]

jobs:
  prepare-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - id: find-lint-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'lint.yml',
                head_sha: context.sha,
                status: 'completed',
                per_page: 100,
              },
            )

            const successfulRun = runs.find((run) => run.conclusion === 'success')

            core.setOutput('run_id', successfulRun ? String(successfulRun.id) : '')
      - id: download-lint-artifact
        if: steps.find-lint-run.outputs.run_id != ''
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: workspace
          path: lint-artifact
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-lint-run.outputs.run_id }}
          github-token: ${{ github.token }}
      - name: Reuse lint pack artifact
        if: steps.download-lint-artifact.outcome == 'success'
        run: cp lint-artifact/* .
      - name: Build pack artifact
        if: steps.download-lint-artifact.outcome != 'success'
        run: |
          vp install --frozen-lockfile
          vp check
          vp pack
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            .
            !lint-artifact/**/*
          if-no-files-found: error

  publish-npm:
    needs: prepare-pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp pm publish --no-git-checks --ignore-scripts

  publish-jsr:
    needs: prepare-pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for JSR auth
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - name: Rewrite discord.js imports for JSR
        run: |
          VERSION=$(node -p "require('./package.json').peerDependencies['discord.js']")
          find src -name '*.ts' | xargs sed -i "s|'discord\.js'|'npm:discord.js@${VERSION}'|g"
      - run: vp dlx jsr publish --allow-dirty
