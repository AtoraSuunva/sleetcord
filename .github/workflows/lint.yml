# GitHub Actions workflow for linting and testing on every push to main

name: Lint and Test

on:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp check
      - run: vp pack
      - name: Bundle workspace output
        run: tar --exclude=.git --exclude=node_modules -czf workspace.tgz .
      - name: Upload packed workspace
        uses: actions/upload-artifact@v4
        with:
          name: packed-workspace
          path: workspace.tgz
          if-no-files-found: error
